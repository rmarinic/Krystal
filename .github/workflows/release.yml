name: Release

# Build, sign and publish a Windows installer whenever you push a version tag.
#   release.bat 0.2.0   →   git tag v0.2.0   →   git push --tags   →   this runs
#
# The job produces a GitHub Release containing:
#   • Krystal_<ver>_x64-setup.exe   (the installer your gf runs once)
#   • latest.json                   (the signed manifest the app polls on launch)
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of ~/.tauri/krystal_updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the password you set (empty string if none)

on:
  push:
    tags:
      - 'v*'

# tauri-action needs to create the release + upload assets.
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps (Tauri CLI)
        run: npm install

      # Pull this version's section out of CHANGELOG.md. tauri-action writes the
      # release body into latest.json as the updater `notes`, so this is exactly
      # what the in-app "update available" prompt shows under "What's new".
      - name: Extract release notes
        id: notes
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          $notes = ""
          if (Test-Path CHANGELOG.md) {
            $md = Get-Content -Raw CHANGELOG.md
            $rx = "(?ms)^##\s+" + [regex]::Escape($ver) + "\b[^\r\n]*\r?\n(.*?)(?=^##\s+|\z)"
            $m = [regex]::Match($md, $rx)
            if ($m.Success) { $notes = $m.Groups[1].Value.Trim() }
          }
          if (-not $notes) { $notes = "Krystal $ver. See the full history on GitHub." }
          $delim = "KRYSTAL_NOTES_EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "notes<<$delim"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $notes
          Add-Content -Path $env:GITHUB_OUTPUT -Value $delim
          Write-Host "Release notes for ${ver}:`n$notes"

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Krystal ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.notes }}
          releaseDraft: false
          prerelease: false
